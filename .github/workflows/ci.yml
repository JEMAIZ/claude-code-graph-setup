name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check setup_claude.py

  test-dry-run:
    name: Test dry-run on fake repo
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create a fake repo (small project)
        run: |
          mkdir -p /tmp/fake-repo/src
          cd /tmp/fake-repo
          git init
          git config user.email "ci@test.com"
          git config user.name "CI"
          for i in $(seq 1 20); do
            echo "def func_$i(): pass" > src/module_$i.py
          done
          git add . && git commit -m "small project"

      - name: Dry-run on small project
        run: |
          cp setup_claude.py /tmp/fake-repo/
          cd /tmp/fake-repo
          output=$(python setup_claude.py --dry-run)
          echo "$output"
          echo "$output" | grep -q "early stage"

      - name: Grow repo to mature size
        run: |
          cd /tmp/fake-repo
          for i in $(seq 21 100); do
            echo "def func_$i(): pass" > src/module_$i.py
          done
          git add . && git commit -m "mature project"

      - name: Dry-run on mature project
        run: |
          cd /tmp/fake-repo
          output=$(python setup_claude.py --dry-run)
          echo "$output"
          echo "$output" | grep -q "Graphify"

      - name: Apply and verify markers
        run: |
          cd /tmp/fake-repo
          python setup_claude.py
          grep -q "graph-tools:start" CLAUDE.md

      - name: Re-run and verify idempotency
        run: |
          cd /tmp/fake-repo
          python setup_claude.py
          count=$(grep -c "graph-tools:start" CLAUDE.md)
          [ "$count" -eq 1 ]
